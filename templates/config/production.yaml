# ------------------------------------------------------------
# Hermes — PRODUCTION config
# ------------------------------------------------------------
# Full-stack, hardened, observable.
#   - Multi-provider with task-aware routing
#   - Telegram + Discord + Slack + Google Chat + LINE + Teams + email gateways
#   - LightRAG + mem0 for cross-device memory
#   - MCP: GitHub, Postgres, Cloudflare, Linear, filesystem
#   - Langfuse tracing, cost alerts, eval hooks
#   - Hardened approval posture
#   - All scheduled skills wired to cron
# ------------------------------------------------------------

version: 1

models:
  default: anthropic/claude-sonnet-5
  classification: google/gemini-3.1-flash
  long_context: google/gemini-3.1-pro
  coding: anthropic/claude-sonnet-5
  reasoning: openai/gpt-5.5
  cheap: moonshot/kimi-k2.6
  live_search: xai/grok-4.3
  providers:
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      prompt_caching: true
    openai:
      api_key: ${OPENAI_API_KEY}
    google:
      api_key: ${GOOGLE_API_KEY}
      oauth_enabled: true            # Use Gemini OAuth when available
    moonshot:
      api_key: ${MOONSHOT_API_KEY}
    zai:
      api_key: ${ZAI_API_KEY}
    cerebras:
      api_key: ${CEREBRAS_API_KEY}
    xai:
      api_key: ${XAI_API_KEY}
      oauth_enabled: true            # SuperGrok OAuth when available

routing:
  # See Part 20 — the rules that drop spend ~90% on typical workloads
  rules:
    - intent: classification
      model: google/gemini-3.1-flash
    - intent: coding
      model: anthropic/claude-sonnet-5
    - intent: long_context
      when: { tokens_in: { gt: 200000 } }
      model: google/gemini-3.1-pro
    - intent: reasoning
      when: { needs_deep_reasoning: true }
      model: openai/gpt-5.5
    - intent: bulk_data
      model: moonshot/kimi-k2.6
    - intent: live_search
      model: xai/grok-4.3

platforms:
  # NOTE: hermes-agent has no per-platform trust tier — the `trust_label`
  # field below was previously set per-platform (high/medium/untrusted), is not a
  # real config key and was silently ignored. No equivalent mechanism
  # exists; every inbound platform is gated equally by approvals.mode below.
  telegram:
    enabled: true
    # `${VAR}` templating is NOT expanded on this config path — the gateway
    # loader reads token/allow_from straight from raw YAML. Set the real
    # values via env instead: TELEGRAM_BOT_TOKEN, TELEGRAM_ALLOWED_USERS
    # (comma-separated numeric IDs) in ~/.hermes/.env.
  discord:
    enabled: true
    bot_token: ${DISCORD_BOT_TOKEN}
    approval_in_dm_only: true
  slack:
    enabled: true
    signing_secret: ${SLACK_SIGNING_SECRET}
    bot_token: ${SLACK_BOT_TOKEN}
  google_chat:
    enabled: false                    # Enable after Workspace app + allowlists are configured
    project_id: ${GOOGLE_CLOUD_PROJECT}
    credentials_json: ${GOOGLE_CHAT_CREDENTIALS_JSON}
    allowed_spaces:
      - ${GOOGLE_CHAT_ADMIN_SPACE}
  teams:
    enabled: false                    # v0.14 end-to-end Graph/listener/delivery path
    tenant_id: ${MICROSOFT_TENANT_ID}
    client_id: ${MICROSOFT_TEAMS_CLIENT_ID}
    client_secret: ${MICROSOFT_TEAMS_CLIENT_SECRET}
    allowed_teams:
      - ${MICROSOFT_TEAMS_ADMIN_TEAM}
  line:
    enabled: false
    channel_access_token: ${LINE_CHANNEL_ACCESS_TOKEN}
    channel_secret: ${LINE_CHANNEL_SECRET}
    allowed_user_ids:
      - ${LINE_ADMIN_USER_ID}
  simplex:
    enabled: false
    profile: simplex-admin
    require_pairing: true
  email:
    enabled: true
    imap:
      host: imap.gmail.com
      user: "${EMAIL_USER}"
      password: "${EMAIL_APP_PASSWORD}"
    smtp:
      host: smtp.gmail.com
      user: "${EMAIL_USER}"
      password: "${EMAIL_APP_PASSWORD}"

memory:
  backend: lightrag
  lightrag:
    working_dir: ~/.hermes/lightrag
    llm_model: google/gemini-3.1-flash
    embedding_model: openai/text-embedding-3-small
  mem0:
    enabled: true
    api_key: ${MEM0_API_KEY}

context:
  compress_trigger_tokens: 48000
  compress_model: google/gemini-3.1-flash
  preserve_last_k: 6

mcp_servers:
  # NOTE: hermes-agent has no user-settable `trust:` tier — the loader
  # (`hermes_cli/mcp_security.py::validate_mcp_server_entry`) automatically
  # force-disables MCP servers it flags as suspicious; there is no manual
  # override, and no per-server `tools_allowlist` restriction mechanism
  # exists either. Sampling control is real but a different shape: nested
  # `sampling: { enabled }` per server, not a flat `allow_sampling` boolean.
  github:
    command: npx
    args: [-y, "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PAT}
    sampling: { enabled: false }
    # NOTE: no per-server tools_allowlist mechanism exists in hermes-agent;
    # this entry previously implied restricting this server to
    # [get_pull_request, list_pull_requests, get_pull_request_diff,
    # create_issue, add_issue_comment, create_pull_request_review] — that
    # intent isn't enforceable today. Real defenses: the approvals.mode
    # gate + built-in dangerous-command detector + optional tirith below.
  postgres:
    command: npx
    args: [-y, "@modelcontextprotocol/server-postgres", "${POSTGRES_URL}"]
    sampling: { enabled: false }
  cloudflare:
    command: npx
    args: [-y, "@cloudflare/mcp-server-cloudflare"]
    env:
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN}"
    sampling: { enabled: false }
  filesystem:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - ${HOME}/Documents
      - ${HOME}/Projects

# Tier-1 escalation: coding-agent-delegate's print-mode routing table.
# See part18-coding-agents.md:108-123.
delegation:
  default: claude-code
  routing:
    - match: { type: refactor, files_changed_gte: 5 }
      agent: claude-code            # large refactors across many files → Claude Code
    - match: { type: bugfix, single_file: true }
      agent: codex                  # single-file bug fix → Codex (fast sandboxed turnaround)
    - match: { type: explore, repo_tokens_gte: 200000 }
      agent: gemini-cli             # whole-repo explore/audit → Gemini CLI (1M context)
    - match: { type: dependency_audit }
      agent: gemini-cli             # dependency audits → Gemini CLI
    - match: { budget: low }
      agent: opencode               # budget-constrained edits → OpenCode + cheap model
      model: moonshot/kimi-k2.6
  # CCS profile Tier 1 delegates as when coding-agent-delegate routes through CCS
  # (see skills/dev/coding-agent-delegate/SKILL.md — `harness: ccs`). Getting
  # actual CK harness ALSO requires ClaudeKit installed on this host (out of
  # this guide's scope) — routing through CCS alone does not grant it. Must be
  # an already-provisioned profile; provision once with the interactive wizard
  # (`ccs api create` — prompts for the key, avoids leaking it via shell
  # history/ps) or, less safely, non-interactively:
  #   ccs api create --preset anthropic --api-key <ANTHROPIC_API_KEY> \
  #     --target claude --yes ccs-hermes   # visible in `ps`/history — prefer the wizard
  # An API profile (not an account profile like ccs auth create) avoids the
  # interactive OAuth login step account profiles require.
  ccs_profile: ccs-hermes

# ACP client bindings dispatched by delegation.routing above.
# Source: part18-coding-agents.md:188-204.
acp:
  # Client-only: this template omits acp.enabled/server (inbound ACP-server mode)
  # since coding-agent-delegate never accepts inbound ACP — see
  # part18-coding-agents.md:188-194 for the full server-mode block if you need it.
  clients:
    claude-code:
      command: claude
      args: ["--acp"]
    codex:
      command: codex
      args: ["--acp"]
    gemini-cli:
      command: gemini
      args: ["--acp"]
    # Not part of the guide's acp verbatim block (part18-coding-agents.md:188-204 ships
    # only claude-code/codex/gemini-cli) — added so delegation.routing's `budget: low`
    # rule (agent: opencode, above) has a matching acp client; same command/--acp shape.
    opencode:
      command: opencode
      args: ["--acp"]
  # /delegate_task picks an ACP client per delegation.routing

# Tier-3 escalation: remote sandbox backends. See part21-remote-sandboxes.md:54-74.
sandboxes:
  dev-box:
    backend: ssh                    # SSH-reachable dev box; other backends (Modal/Daytona) follow the same shape
    host: dev.local
    user: hermes
    identity_file: ~/.ssh/hermes_ed25519   # key path, not key material — not a secret
    workdir: /home/hermes/sandboxes
    control_master: auto            # reuses one SSH connection for bulk sync
    control_persist: 600
    sync:
      push: ~/.hermes               # uploaded to the sandbox at `/sandbox start`
      pull_on_teardown: true        # syncs remote changes back on `/sandbox stop`
      pull_paths:
        - .hermes
        - projects                  # grabs any code changes made in-sandbox
      ignore:
        - .git
        - node_modules
        - __pycache__
        - "*.log"
        - .env                      # CRITICAL: excludes ~/.hermes/.env. Without this,
                                     # `push: ~/.hermes` above would sync live provider
                                     # API keys to the remote sandbox host, violating
                                     # part19-security-playbook.md:196 ("the agent cannot
                                     # read ~/.hermes/.env — keys stay on the host").

# hermes-agent approval controls are TOP-LEVEL keys, not nested under
# `security:`. This block previously implied a per-tool approval matrix
# (github/terminal/email/twilio/any_mcp/delegate_task/kanban/sandbox), a
# named-subagent bypass list, a custom deny-list regex, and a dedicated
# approval-channel setting — none of those exist. Real handling:
approvals:
  mode: manual              # manual | smart | off (off == --yolo, session-scoped)
  timeout: 60                # seconds before an unanswered request auto-rejects
  cron_mode: deny            # deny | approve — dangerous command inside a cron job.
                              # Replaces the old per-job `bypass_subagents` list
                              # (nightly-backup/weekly-dep-audit/cost-report) —
                              # this gate is global for all cron jobs, no
                              # per-named-job bypass exists.
  mcp_reload_confirm: true
  destructive_slash_confirm: true

# Allow-list ONLY (root-level). Entries here PERMANENTLY allow a pattern the
# operator already approved once. There is NO user-editable deny-list/regex —
# the old per-tool deny pattern list (rm -rf /, curl|sh, metadata IP, ssh key
# reads, aws s3 sync, ssh-keyscan) has no config-schema equivalent. Built-in
# dangerous-command detector + optional tirith below are the real defenses.
command_allowlist: []

security:
  allow_private_urls: false
  redact_secrets: true        # single on/off toggle (built-in detectors); NOT
                               # the old user-editable per-pattern regex list
                               # (sk-*, xoxb-*, ghp_*, github_pat_*, AKIA*)
  tirith_enabled: true        # external pre-exec scanner (own binary + rule file)
  tirith_path: tirith
  tirith_timeout: 5
  tirith_fail_open: true      # true = allow on scanner error; false = fail-closed
  website_blocklist:
    enabled: false
    domains: []
    shared_files: []
  acked_advisories: []
  allow_lazy_installs: true
  # NOTE: hermes-agent has no per-tool approval matrix, no user-editable
  # deny-list regex, no separate approval-channel (approvals route to
  # whichever channel the message came from), no per-server tools_allowlist,
  # and no per-platform trust tier. Prior versions of this file implied all
  # of these; they were silently ignored. Real defenses: the global
  # approvals.mode gate above, the built-in dangerous-command detector,
  # optional tirith, MCP-server auto-disable on suspicious entries, and
  # OS-level isolation ("the only real security boundary is the OS").

# Webhook signing is via the WEBHOOK_SECRET env var or a per-route `secret:`,
# not a `security.webhook.*` config block (old require_signature/max_body_bytes
# implied one). hermes-agent's own webhook adapter (not Caddy) enforces
# platforms.webhook.extra.rate_limit (default 30/min) and
# platforms.webhook.extra.max_body_bytes (default 1MB) when a
# `platforms.webhook` section is configured — this template doesn't configure
# one today; noting the real mechanism here, not adding the section. There is
# no `ttl_seconds` equivalent (webhook staleness has no config-schema knob).

telemetry:
  level: info
  exporters:
    langfuse:
      public_key: ${LANGFUSE_PUBLIC_KEY}
      secret_key: ${LANGFUSE_SECRET_KEY}
      host: ${LANGFUSE_HOST}
  alerts:
    cost_per_hour_usd: 5.0
    tokens_per_turn: 30000
    webhook: ${ALERT_WEBHOOK_URL}

# Keep this block's job set/schedules/notify channel in sync with
# templates/cron/production-crons.yaml — the two are independently
# maintained and will drift silently otherwise.
cron:
  - { name: nightly-backup,     schedule: "0 3 * * *",   task: "/nightly-backup s3://backups/hermes/ 30", notify: telegram_dm }
  - { name: weekly-dep-audit,   schedule: "0 9 * * 1",   task: "/weekly-dep-audit severity_floor=high",   notify: telegram_dm }
  - { name: weekly-cost-report, schedule: "0 9 * * 1",   task: "/cost-report window=7d format=markdown",  notify: telegram_dm }
  - { name: weekly-mcp-audit,   schedule: "0 10 * * 1",  task: "/audit-mcp",                              notify: telegram_dm }
  - { name: monthly-rotate,     schedule: "0 4 1 * *",   task: "/rotate-secrets webhook_hmac_*",          notify: telegram_dm }
  # Part 5/7 hygiene reminders. `hermes curator enable` is a real native
  # scheduler (part5-creating-skills.md:128) but has no documented YAML config
  # surface to drive from this file; `/journey` (part7-memory-system.md:116-123)
  # is interactive-only with no headless mode at all. Both entries below are
  # scheduled REMINDERS pointing at the real CLI/TUI commands — not a claim
  # that this file automates either one.
  - { name: monthly-skill-curator-reminder, schedule: "0 8 1 * *", task: "Reminder: run `hermes curator run --dry-run` then `hermes curator run` to review skill-library duplicates/stale skills.", notify: telegram_dm }
  - { name: monthly-journey-reminder,       schedule: "0 8 2 * *", task: "Reminder: open `/journey` and prune any wrong or stale memory entries.", notify: telegram_dm }
