# ------------------------------------------------------------
# Hermes — PRODUCTION config
# ------------------------------------------------------------
# Full-stack, hardened, observable.
#   - Multi-provider with task-aware routing
#   - Telegram + Discord + Slack + Google Chat + LINE + Teams + email gateways
#   - LightRAG + mem0 for cross-device memory
#   - MCP: GitHub, Postgres, Cloudflare, Linear, filesystem
#   - Langfuse tracing, cost alerts, eval hooks
#   - Hardened approval posture
#   - All scheduled skills wired to cron
# ------------------------------------------------------------

version: 1

models:
  default: anthropic/claude-sonnet-5
  classification: google/gemini-3.1-flash
  long_context: google/gemini-3.1-pro
  coding: anthropic/claude-sonnet-5
  reasoning: openai/gpt-5.5
  cheap: moonshot/kimi-k2.6
  live_search: xai/grok-4.3
  providers:
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      prompt_caching: true
    openai:
      api_key: ${OPENAI_API_KEY}
    google:
      api_key: ${GOOGLE_API_KEY}
      oauth_enabled: true            # Use Gemini OAuth when available
    moonshot:
      api_key: ${MOONSHOT_API_KEY}
    zai:
      api_key: ${ZAI_API_KEY}
    cerebras:
      api_key: ${CEREBRAS_API_KEY}
    xai:
      api_key: ${XAI_API_KEY}
      oauth_enabled: true            # SuperGrok OAuth when available

routing:
  # See Part 20 — the rules that drop spend ~90% on typical workloads
  rules:
    - intent: classification
      model: google/gemini-3.1-flash
    - intent: coding
      model: anthropic/claude-sonnet-5
    - intent: long_context
      when: { tokens_in: { gt: 200000 } }
      model: google/gemini-3.1-pro
    - intent: reasoning
      when: { needs_deep_reasoning: true }
      model: openai/gpt-5.5
    - intent: bulk_data
      model: moonshot/kimi-k2.6
    - intent: live_search
      model: xai/grok-4.3

platforms:
  telegram:
    enabled: true
    # `${VAR}` templating is NOT expanded on this config path — the gateway
    # loader reads token/allow_from straight from raw YAML. Set the real
    # values via env instead: TELEGRAM_BOT_TOKEN, TELEGRAM_ALLOWED_USERS
    # (comma-separated numeric IDs) in ~/.hermes/.env.
    trust_label: high
  discord:
    enabled: true
    bot_token: ${DISCORD_BOT_TOKEN}
    trust_label: medium
    approval_in_dm_only: true
  slack:
    enabled: true
    signing_secret: ${SLACK_SIGNING_SECRET}
    bot_token: ${SLACK_BOT_TOKEN}
    trust_label: medium
  google_chat:
    enabled: false                    # Enable after Workspace app + allowlists are configured
    project_id: ${GOOGLE_CLOUD_PROJECT}
    credentials_json: ${GOOGLE_CHAT_CREDENTIALS_JSON}
    allowed_spaces:
      - ${GOOGLE_CHAT_ADMIN_SPACE}
    trust_label: medium
  teams:
    enabled: false                    # v0.14 end-to-end Graph/listener/delivery path
    tenant_id: ${MICROSOFT_TENANT_ID}
    client_id: ${MICROSOFT_TEAMS_CLIENT_ID}
    client_secret: ${MICROSOFT_TEAMS_CLIENT_SECRET}
    allowed_teams:
      - ${MICROSOFT_TEAMS_ADMIN_TEAM}
    trust_label: medium
  line:
    enabled: false
    channel_access_token: ${LINE_CHANNEL_ACCESS_TOKEN}
    channel_secret: ${LINE_CHANNEL_SECRET}
    allowed_user_ids:
      - ${LINE_ADMIN_USER_ID}
    trust_label: medium
  simplex:
    enabled: false
    profile: simplex-admin
    require_pairing: true
    trust_label: medium
  email:
    enabled: true
    imap:
      host: imap.gmail.com
      user: "${EMAIL_USER}"
      password: "${EMAIL_APP_PASSWORD}"
    smtp:
      host: smtp.gmail.com
      user: "${EMAIL_USER}"
      password: "${EMAIL_APP_PASSWORD}"
    trust_label: untrusted

memory:
  backend: lightrag
  lightrag:
    working_dir: ~/.hermes/lightrag
    llm_model: google/gemini-3.1-flash
    embedding_model: openai/text-embedding-3-small
  mem0:
    enabled: true
    api_key: ${MEM0_API_KEY}

context:
  compress_trigger_tokens: 48000
  compress_model: google/gemini-3.1-flash
  preserve_last_k: 6

mcp_servers:
  github:
    command: npx
    args: [-y, "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PAT}
    trust: trusted
    allow_sampling: false
    tools_allowlist:
      - get_pull_request
      - list_pull_requests
      - get_pull_request_diff
      - create_issue
      - add_issue_comment
      - create_pull_request_review
  postgres:
    command: npx
    args: [-y, "@modelcontextprotocol/server-postgres", "${POSTGRES_URL}"]
    trust: trusted
    allow_sampling: false
  cloudflare:
    command: npx
    args: [-y, "@cloudflare/mcp-server-cloudflare"]
    env:
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN}"
    trust: trusted
    allow_sampling: false
  filesystem:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - ${HOME}/Documents
      - ${HOME}/Projects
    trust: trusted

# Tier-1 escalation: coding-agent-delegate's print-mode routing table.
# See part18-coding-agents.md:108-123.
delegation:
  default: claude-code
  routing:
    - match: { type: refactor, files_changed_gte: 5 }
      agent: claude-code            # large refactors across many files → Claude Code
    - match: { type: bugfix, single_file: true }
      agent: codex                  # single-file bug fix → Codex (fast sandboxed turnaround)
    - match: { type: explore, repo_tokens_gte: 200000 }
      agent: gemini-cli             # whole-repo explore/audit → Gemini CLI (1M context)
    - match: { type: dependency_audit }
      agent: gemini-cli             # dependency audits → Gemini CLI
    - match: { budget: low }
      agent: opencode               # budget-constrained edits → OpenCode + cheap model
      model: moonshot/kimi-k2.6

# ACP client bindings dispatched by delegation.routing above.
# Source: part18-coding-agents.md:188-204.
acp:
  # Client-only: this template omits acp.enabled/server (inbound ACP-server mode)
  # since coding-agent-delegate never accepts inbound ACP — see
  # part18-coding-agents.md:188-194 for the full server-mode block if you need it.
  clients:
    claude-code:
      command: claude
      args: ["--acp"]
    codex:
      command: codex
      args: ["--acp"]
    gemini-cli:
      command: gemini
      args: ["--acp"]
    # Not part of the guide's acp verbatim block (part18-coding-agents.md:188-204 ships
    # only claude-code/codex/gemini-cli) — added so delegation.routing's `budget: low`
    # rule (agent: opencode, above) has a matching acp client; same command/--acp shape.
    opencode:
      command: opencode
      args: ["--acp"]
  # /delegate_task picks an ACP client per delegation.routing

# Tier-3 escalation: remote sandbox backends. See part21-remote-sandboxes.md:54-74.
sandboxes:
  dev-box:
    backend: ssh                    # SSH-reachable dev box; other backends (Modal/Daytona) follow the same shape
    host: dev.local
    user: hermes
    identity_file: ~/.ssh/hermes_ed25519   # key path, not key material — not a secret
    workdir: /home/hermes/sandboxes
    control_master: auto            # reuses one SSH connection for bulk sync
    control_persist: 600
    sync:
      push: ~/.hermes               # uploaded to the sandbox at `/sandbox start`
      pull_on_teardown: true        # syncs remote changes back on `/sandbox stop`
      pull_paths:
        - .hermes
        - projects                  # grabs any code changes made in-sandbox
      ignore:
        - .git
        - node_modules
        - __pycache__
        - "*.log"
        - .env                      # CRITICAL: excludes ~/.hermes/.env. Without this,
                                     # `push: ~/.hermes` above would sync live provider
                                     # API keys to the remote sandbox host, violating
                                     # part19-security-playbook.md:196 ("the agent cannot
                                     # read ~/.hermes/.env — keys stay on the host").

security:
  approval:
    bypass_subagents:
      - nightly-backup
      - weekly-dep-audit
      - cost-report
    auto_approve_read: true
    denylist:
      - 'rm\s+-rf\s+/'
      - 'curl\s+.+\|\s*(sh|bash)'
      - '169\.254\.169\.254'
      - 'cat\s+~?/?\.?ssh/'
      - 'aws\s+s3\s+sync\s+.+\s+s3://'
      - 'ssh-keyscan'
    require_approval:
      - { tool: github,  actions: [create_pr, merge_pr, delete_branch] }
      - { tool: terminal, actions: [exec] }
      - { tool: email,    actions: [send] }
      - { tool: twilio,   actions: [send_sms] }
      - { tool: any_mcp,  sampling: true }
      # Structured, write-capable delegation surfaces — same risk class as
      # `terminal` above, gated the same way. NOTE: `denylist` below is a regex
      # match over terminal exec strings only; it does NOT see these structured
      # tool calls — known gap, not addressed here.
      - { tool: delegate_task, actions: [dispatch] }
      - { tool: kanban,   actions: [create, assign] }
      - { tool: sandbox,  actions: [start, stop] }
    approval_channel: telegram_dm
  secrets:
    redaction_patterns:
      - 'sk-[A-Za-z0-9]{40,}'
      - 'xoxb-[A-Za-z0-9-]{40,}'
      - 'ghp_[A-Za-z0-9]{36}'
      - 'github_pat_[A-Za-z0-9_]{80,}'
      - 'AKIA[0-9A-Z]{16}'
    memory_write_redaction: true
  webhook:
    require_signature: true
    max_body_bytes: 1048576

telemetry:
  level: info
  exporters:
    langfuse:
      public_key: ${LANGFUSE_PUBLIC_KEY}
      secret_key: ${LANGFUSE_SECRET_KEY}
      host: ${LANGFUSE_HOST}
  alerts:
    cost_per_hour_usd: 5.0
    tokens_per_turn: 30000
    webhook: ${ALERT_WEBHOOK_URL}

cron:
  - { name: nightly-backup,     schedule: "0 3 * * *",   task: "/nightly-backup s3://backups/hermes/ 30", notify: telegram_dm }
  - { name: weekly-dep-audit,   schedule: "0 9 * * 1",   task: "/weekly-dep-audit severity_floor=high",   notify: telegram_dm }
  - { name: weekly-cost-report, schedule: "0 9 * * 1",   task: "/cost-report window=7d format=markdown",  notify: telegram_dm }
  - { name: weekly-mcp-audit,   schedule: "0 10 * * 1",  task: "/audit-mcp",                              notify: telegram_dm }
  - { name: monthly-rotate,     schedule: "0 4 1 * *",   task: "/rotate-secrets webhook_hmac_*",          notify: telegram_dm }
